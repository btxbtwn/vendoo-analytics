name: AI Code Review (DeepSeek)

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  deepseek-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-${{ github.event.pull_request.number }}
            git diff --no-color origin/main...pr-${{ github.event.pull_request.number }} > diff.txt || true
          else
            git diff --no-color HEAD~1..HEAD > diff.txt || true
          fi
          echo "diff_file=diff.txt" >> $GITHUB_OUTPUT
          wc -l diff.txt

      - name: Read AGENTS.md guidelines
        id: guidelines
        run: |
          if [ -f AGENTS.md ]; then
            cat AGENTS.md
          else
            echo "No AGENTS.md found"
          fi

      - name: Call DeepSeek API for review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          DIFF=$(cat diff.txt | head -c 50000)
          GUIDELINES=$(cat AGENTS.md 2>/dev/null || echo "")

          PROMPT=$(cat <<EOF
          You are a code reviewer for a Next.js analytics dashboard. Review the following pull request diff and provide constructive feedback.

          PR Title: $PR_TITLE
          PR Description: $PR_BODY

          Repository guidelines:
          $GUIDELINES

          Diff (truncated to 50KB):
          $DIFF

          Focus on:
          1. TypeScript type safety violations (any, missing types, type assertions that could hide bugs)
          2. React performance issues (unnecessary re-renders, missing useMemo/useCallback, large bundle additions)
          3. Mobile responsiveness regressions (hardcoded pixel widths, missing flex-wrap, overflow)
          4. Chart/data correctness issues (wrong data transforms, broken aggregations, incorrect chart configs)
          5. Hardcoded secrets, tokens, API keys, or credentials
          6. Loading/empty/error state gaps (missing skeleton, no fallback, unhandled errors)
          7. Anything in violation of AGENTS.md guidelines

          Provide a concise review with:
          - Summary (1-2 sentences)
          - Issues found (P0/P1/P2/P3)
          - Suggested improvements
          EOF
          )

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{model: "deepseek-chat", messages: [{role: "user", content: $prompt}], temperature: 0.1, max_tokens: 4000}')

          echo "Calling DeepSeek API..."
          curl -s -X POST "https://api.deepseek.com/chat/completions" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" > review_response.json

          if [ ! -s review_response.json ]; then
            echo "Empty response from DeepSeek"
            exit 1
          fi

          REVIEW=$(jq -r '.choices[0].message.content // "No review content returned"' review_response.json)
          echo "$REVIEW" > review.md
          echo "Review generated ($(wc -c < review.md) bytes)"

      - name: Post review comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            const body = `## DeepSeek AI Review\n\n${review}\n\n---\n*Generated by DeepSeek via GitHub Actions*`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-review
          path: review.md
